<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설치의뢰서 검증 시스템</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>설치의뢰서 검증 시스템</h1>

        <div class="card">
            <h3>설치의뢰서 (PDF)</h3>
            <input type="file" id="pdfFile" accept=".pdf">
            <br><br>
            <canvas id="pdfViewer" style="width: 100%; border: 1px solid #ddd; margin-top: 10px; display: none;"></canvas>
        </div>

        <div class="card">
            <h3>주문 품목</h3>
            <ul id="orderList">
                <li>아직 불러온 품목이 없습니다.</li>
            </ul>
        </div>

        <div class="card">
            <h3>스티커 검수</h3>
            <input type="file" accept="image/*" capture="environment" id="cameraInput">
            <br><br>
            <input type="text" id="manualInput" placeholder="모델명 직접 입력 (또는 사진 인식 자동 입력)">
            <br><br>
            <button id="checkBtn">검수</button>
        </div>

        <div class="card">
            <h3>인식 결과</h3>
            <div id="ocrResult">아직 인식된 내용 없음</div>
        </div>

        <div class="card">
            <h3>검수 현황</h3>
            <div id="status">확인완료 0 / 0</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
