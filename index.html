<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Daon E.N.G 자재 검수 시스템</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .item { background: white; padding: 12px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .checked { background: #d1fae5; text-decoration: line-through; color: #065f46; }
        button { padding: 6px 12px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>자재 상차 검수 리스트</h2>
    <input type="file" id="pdfFile" accept="application/pdf">
    <div id="orderList" style="margin-top:20px;"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        document.getElementById("pdfFile").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async () => {
                const pdf = await pdfjsLib.getDocument({data: new Uint8Array(reader.result)}).promise;
                const orderList = document.getElementById("orderList");
                orderList.innerHTML = "";
                let foundModels = new Set();

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = (await page.getTextContent()).items.map(it => it.str).join(" ");
                    
                    // 1. 특수 확장자(BKOR, EKOR)를 가진 모델명은 우선 수집
                    const specialMatches = text.match(/(SQ|FQ)[A-Z0-9]{4,15}\.(BKOR|EKOR)/g);
                    if (specialMatches) {
                        specialMatches.forEach(m => foundModels.add(m));
                    }

                    // 2. 일반 모델명 중 .AKOR이 붙은 것들은 모두 수집하되,
                    // 세트 모델명과 자재 모델명 사이의 간섭을 피하기 위해 
                    // SQ 또는 FQ로 시작하는 것만 엄격하게 분리
                    const generalMatches = text.match(/(SQ|FQ)[A-Z0-9]{4,15}/g);
                    if (generalMatches) {
                        generalMatches.forEach(m => {
                            // PQ 제외, 숫자만으로 구성된 세트 모델명(너무 긴 것) 제외
                            if (!m.startsWith("PQ") && m.length < 15) {
                                // .AKOR이 붙은 것들은 이제 화면에 표기할 때 .AKOR을 떼고 보여줌
                                const cleanName = m.replace(".AKOR", "");
                                foundModels.add(cleanName);
                            }
                        });
                    }
                }

                // 리스트 출력
                [...foundModels].sort().forEach(model => {
                    const div = document.createElement("div");
                    div.className = "item";
                    div.innerHTML = `<span>${model}</span> <button onclick="this.parentElement.classList.add('checked')">확인</button>`;
                    orderList.appendChild(div);
                });
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
