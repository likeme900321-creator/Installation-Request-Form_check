<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daon E.N.G 자재 검수 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.0/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f1f5f9; padding: 15px; margin: 0; color: #1e293b; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h2 { text-align: center; color: #1e3a8a; margin-top: 0; font-size: 20px; }
        .card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 5px; }
        .btn-success { background: #16a34a; color: white; }
        #pdfCanvas { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; margin-top: 10px; background: #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Daon E.N.G 자재 검수 시스템</h2>
    <div class="card">
        <input type="file" id="pdfFile" accept="application/pdf" style="width: 100%;">
    </div>

    <div id="orderList" class="card"></div>

    <div class="card">
        <label>📸 실물 바코드 스캔</label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" class="btn">
        <div id="ocrResult">스캔 대기 중...</div>
    </div>

    <div class="card">
        <input type="text" id="manualInput" placeholder="모델명 수동 입력">
        <button id="checkBtn" class="btn btn-success">✅ 상차 자재 검수 확정</button>
        <div id="status"></div>
    </div>

    <canvas id="pdfCanvas"></canvas>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let pdfDoc = null;
    let currentPageTargetModels = [];

    document.getElementById("pdfFile").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async function () {
            pdfDoc = await pdfjsLib.getDocument({data: new Uint8Array(this.result)}).promise;
            await renderPage(1);
        };
        reader.readAsArrayBuffer(file);
    });

    async function renderPage(p) {
        const page = await pdfDoc.getPage(p);
        const textContent = await page.getTextContent();
        const allText = textContent.items.map(it => it.str).join(" ");
        
        // 🎯 핵심: 세트 모델명 차단 필터 적용 (끝자리 S 제외, 끝 3자리 숫자 포함 제외)
        const matches = allText.match(/(SQ|FQ)[A-Z0-9]{4,10}/g);
        let validModels = [];

        if (matches) {
            matches.forEach(m => {
                if (m.startsWith("PQ") || m.endsWith("S") || /\d/.test(m.slice(-3))) return;
                
                let final = m;
                if (allText.includes(m + ".BKOR")) final = m + ".BKOR";
                else if (allText.includes(m + ".EKOR")) final = m + ".EKOR";
                
                if (!validModels.includes(final)) validModels.push(final);
            });
        }
        
        currentPageTargetModels = validModels;
        
        // 리스트 출력
        const listDiv = document.getElementById("orderList");
        listDiv.innerHTML = "<b>[배정 자재 목록]</b><br>" + validModels.map(m => `• ${m}`).join("<br>");
    }

    // 바코드 스캔 및 검수 확정 로직 (위의 로직과 동일하게 유지)
    document.getElementById("checkBtn").addEventListener("click", () => {
        const input = document.getElementById("manualInput").value.trim().toUpperCase();
        if (currentPageTargetModels.includes(input)) {
            alert("✅ 정상 상차 자재입니다: " + input);
        } else {
            alert("❌ 오상차 위험 품목입니다!");
        }
    });
</script>
</body>
</html>
