<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Daon E.N.G 자재 정밀 검수 시스템</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .item { background: white; padding: 12px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .checked { background: #d1fae5; text-decoration: line-through; color: #065f46; }
        button { padding: 6px 12px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>자재 상차 검수 리스트</h2>
    <input type="file" id="pdfFile" accept="application/pdf">
    <div id="orderList" style="margin-top:20px;"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        document.getElementById("pdfFile").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async () => {
                const pdf = await pdfjsLib.getDocument({data: new Uint8Array(reader.result)}).promise;
                const orderList = document.getElementById("orderList");
                orderList.innerHTML = "";
                let foundModels = new Set();

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    
                    // 텍스트를 줄 단위로 재구성
                    let items = textContent.items;
                    
                    items.forEach(item => {
                        let text = item.str.trim();
                        
                        // 1. SQ 또는 FQ로 시작하는 것만 추출
                        // 2. PQ는 필터링
                        // 3. 세트 모델명은 보통 매우 긴 숫자이므로 길이를 제한 (예: 12자 미만)
                        if ((text.startsWith("SQ") || text.startsWith("FQ")) && !text.startsWith("PQ") && text.length < 15) {
                            
                            // 특수 확장자(BKOR, EKOR)가 포함된 경우만 살리고, AKOR은 제거
                            let cleanModel = text.replace(".AKOR", "");
                            
                            // 최종 검증: 불필요한 세트 모델명(숫자가 주를 이루는 패턴) 제외
                            if (/[A-Z]{2}[0-9]{2}[A-Z0-9]{4,}/.test(cleanModel)) {
                                foundModels.add(cleanModel);
                            }
                        }
                    });
                }

                [...foundModels].sort().forEach(model => {
                    const div = document.createElement("div");
                    div.className = "item";
                    div.innerHTML = `<span>${model}</span> <button onclick="this.parentElement.classList.add('checked')">확인</button>`;
                    orderList.appendChild(div);
                });
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</html>
