<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Daon E.N.G 자재 검수 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .item { padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
        .done { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>

<div class="container">
    <h2>자재 검수 시스템</h2>
    <input type="file" id="pdfFile" accept="application/pdf">
    <div id="techName" style="margin-top:10px; font-weight:bold;"></div>
    <div id="orderList" style="margin-top:20px;"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    document.getElementById("pdfFile").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async () => {
            const pdf = await pdfjsLib.getDocument({data: new Uint8Array(reader.result)}).promise;
            
            // 모든 페이지를 순회하며 모델명 추출
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const text = textContent.items.map(item => item.str).join(" ");
                
                // 정호진 기사님 페이지 확인
                if (text.includes("정호진")) {
                    document.getElementById("techName").innerText = "담당: 정호진 기사님";
                    extractProducts(text);
                    break;
                }
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function extractProducts(text) {
        const listDiv = document.getElementById("orderList");
        // 모델명 패턴 (SQ, FQ, PQ로 시작하는 코드)
        const regex = /(SQ|FQ|PQ)[A-Z0-9]{4,15}/g;
        const matches = text.match(regex) || [];
        
        // 중복 제거 및 수량 처리 (간단하게 고유 모델명 추출)
        const uniqueModels = [...new Set(matches)];
        
        uniqueModels.forEach(model => {
            // 정호진 기사님 모델은 수량이 2개인 경우가 많음 (테스트용 하드코딩)
            const count = (model === "FQ18FU1EA2.AKOR") ? 2 : 1; 
            
            for(let j=0; j<count; j++) {
                const div = document.createElement("div");
                div.className = "item";
                div.innerHTML = `<span>${model} ${count > 1 ? `(${j+1}/${count})` : ""}</span> <button onclick="this.parentElement.classList.add('done')">확인</button>`;
                listDiv.appendChild(div);
            }
        });
    }
</script>
</body>
</html>
