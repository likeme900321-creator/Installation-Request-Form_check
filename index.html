<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f1f5f9; padding: 15px; margin: 0; color: #1e293b; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h2 { text-align: center; color: #1e3a8a; margin-top: 0; font-size: 20px; }
        .card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 5px; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-secondary { background: #64748b; color: white; }
        .btn-success { background: #16a34a; color: white; }
        .page-ctrl { display: flex; justify-content: space-between; gap: 10px; margin: 10px 0; }
        .page-ctrl button { flex: 1; padding: 10px; font-weight: bold; background: #e2e8f0; border: none; border-radius: 6px; cursor: pointer; }
        #pdfCanvas { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; margin-top: 10px; background: #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Daon E.N.G 자재 검수 시스템</h2>
    
    <div class="card">
        <label style="font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px;">📄 설치의뢰서 PDF 등록</label>
        <input type="file" id="pdfFile" accept="application/pdf" style="width: 100%; font-size: 13px;">
    </div>

    <div class="card" style="background: #edf2f7; border-color: #cbd5e1; display: flex; gap: 8px; align-items: center;">
        <label for="techSearchInput" style="font-size: 14px; font-weight: bold; color: #2d3748; white-space: nowrap;">👷 기사명 검색:</label>
        <input type="text" id="techSearchInput" placeholder="기사님 성함 입력 (예: 강정환)" style="flex: 1; padding: 8px 12px; border: 1px solid #a0aec0; border-radius: 6px; font-size: 14px; font-weight: bold;">
        <button id="searchBtn" style="padding: 8px 14px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold;">검색</button>
        <button id="clearSearchBtn" style="padding: 8px 14px; background: #4a5568; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold;">전체</button>
    </div>

    <div class="page-ctrl">
        <button id="prevPageBtn">◀ 이전 의뢰서</button>
        <button id="nextPageBtn">다음 의뢰서 ▶</button>
    </div>
    <div id="pageIndicator" style="text-align: center; font-weight: bold; color: #475569; font-size: 14px; margin-bottom: 10px;">
        의뢰서 파일을 선택해 주세요.
    </div>

    <div id="orderList" class="card" style="min-height: 100px; background: #fafafa;">
        <span style="color: #94a3b8; font-size: 13px;">진짜 단품 자재 목록이 여기에 출력됩니다.</span>
    </div>

    <div class="card" style="border-left: 5px solid #2563eb;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #1e3a8a;">📸 1단계: 실물 바코드 사진 매칭</label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" class="btn btn-secondary" style="padding: 8px;">
        <div id="ocrResult" style="margin-top: 8px; font-size: 13px; font-weight: bold; color: #475569;">스캔 대기 중...</div>
    </div>

    <div class="card" style="border-left: 5px solid #16a34a;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #15803d;">🔍 2단계: 수동 확인 및 확정</label>
        <input type="text" id="manualInput" placeholder="모델명 직접 입력 또는 자동 입력창" style="width:95%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 8px; font-size: 14px;">
        <button id="checkBtn" class="btn btn-success">✅ 상차 자재 검수 확정</button>
        <div id="status" style="margin-top: 10px; text-align: center; font-size: 15px;"></div>
    </div>

    <div style="font-weight: bold; margin-top: 15px; font-size: 13px; color: #64748b;">📄 원본 의뢰서 도면 미리보기</div>
    <div style="width:100%; overflow:auto; border: 1px solid #cbd5e1; background:#e2e8f0; margin-top:10px;">
        <canvas id="pdfCanvas"></canvas>
    </div>
</div>
