<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daon E.N.G 에어컨 자재 검수 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f1f5f9; padding: 15px; margin: 0; color: #1e293b; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h2 { text-align: center; color: #1e3a8a; margin-top: 0; font-size: 20px; }
        .card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 5px; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-secondary { background: #64748b; color: white; }
        .btn-success { background: #16a34a; color: white; }
        
        .page-ctrl { display: flex; justify-content: space-between; gap: 10px; margin: 10px 0; }
        .page-ctrl button { flex: 1; padding: 10px; font-weight: bold; background: #e2e8f0; border: none; border-radius: 6px; cursor: pointer; }
        #pdfCanvas { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; margin-top: 10px; background: #e2e8f0; }
        
        .prod-item { margin-bottom: 8px; border: 1px solid #e2e8f0; padding: 12px; border-radius: 6px; background: white; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        .prod-item:hover { background: #f0fdf4; }
        .prod-status-wait { background: #fff7ed; border-color: #ffedd5; color: #c2410c; font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .prod-status-done { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        
        #scannerContainer { display: none; width: 100%; max-width: 400px; margin: 10px auto; position: relative; border-radius: 8px; overflow: hidden; border: 2px solid #2563eb; }
        #previewVideo { width: 100%; height: auto; display: block; background: #000; }
        .scan-guide-line { position: absolute; top: 50%; left: 5%; width: 90%; height: 2px; background: red; box-shadow: 0 0 8px red; transform: translateY(-50%); animation: laser 1.5s infinite; }
        @keyframes laser { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Daon E.N.G 자재 검수 시스템</h2>
    
    <div class="card">
        <label style="font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px;">📄 설치의뢰서 PDF 등록</label>
        <input type="file" id="pdfFile" accept="application/pdf" style="width: 100%; font-size: 13px;">
    </div>

    <div class="card" style="background: #edf2f7; border-color: #cbd5e1; display: flex; gap: 8px; align-items: center;">
        <label for="techSearchInput" style="font-size: 14px; font-weight: bold; color: #2d3748; white-space: nowrap;">👷 기사명 검색:</label>
        <input type="text" id="techSearchInput" placeholder="기사님 성함 입력 (예: 정호진)" style="flex: 1; padding: 8px 12px; border: 1px solid #a0aec0; border-radius: 6px; font-size: 14px; font-weight: bold;">
        <button id="searchBtn" style="padding: 8px 14px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold;">검색</button>
        <button id="clearSearchBtn" style="padding: 8px 14px; background: #4a5568; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold;">전체</button>
    </div>

    <div class="page-ctrl">
        <button id="prevPageBtn">◀ 이전 의뢰서</button>
        <button id="nextPageBtn">다음 의뢰서 ▶</button>
    </div>
    <div id="pageIndicator" style="text-align: center; font-weight: bold; color: #475569; font-size: 14px; margin-bottom: 10px;">
        의뢰서 파일을 선택해 주세요.
    </div>

    <div id="orderList" class="card" style="min-height: 100px; background: #fafafa;">
        <span style="color: #94a3b8; font-size: 13px;">진짜 단품 자재 목록이 여기에 출력됩니다.</span>
    </div>

    <div class="card" style="border-left: 5px solid #2563eb;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #1e3a8a;">📸 1단계: 실물 바코드 스캔 매칭 (위/아래 바코드 모두 가능)</label>
        <div style="display:flex; gap:8px;">
            <button id="startScanBtn" class="btn btn-primary" style="margin:0; flex:2;">🔍 바코드 카메라 켜기</button>
            <button id="resetScanBtn" class="btn btn-secondary" style="margin:0; flex:1; background:#4a5568;">❌ 스캔 초기화</button>
        </div>
        
        <div id="scannerContainer">
            <video id="previewVideo"></video>
            <div class="scan-guide-line"></div>
        </div>
        <div id="ocrResult" style="margin-top: 8px; font-size: 13px; font-weight: bold; color: #475569;">스캔 대기 중...</div>
    </div>

    <div class="card" style="border-left: 5px solid #16a34a;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #15803d;">🔍 2단계: 수동 확인 및 확정</label>
        <input type="text" id="manualInput" placeholder="모델명 직접 입력 또는 자재 목록 클릭" style="width:95%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 8px; font-size: 14px;">
        <button id="checkBtn" class="btn btn-success">✅ 상차 자재 검수 확정</button>
        <div id="status" style="margin-top: 10px; text-align: center; font-size: 15px;"></div>
    </div>

    <div style="font-weight: bold; margin-top: 15px; font-size: 13px; color: #64748b;">📄 원본 의뢰서 도면 미리보기</div>
    <div style="width:100%; overflow:auto; border: 1px solid #cbd5e1; background:#e2e8f0; margin-top:10px;">
        <canvas id="pdfCanvas"></canvas>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfDoc = null;          
    let currentPdfPage = 1;     
    let totalPdfPages = 0;      
    let currentRenderTask = null;

    let currentTechnician = "미지정";
    let currentCustomer = "미확인";
    let currentPageProducts = []; 

    const codeReader = new ZXing.BrowserMultiFormatReader();
    let isScanning = false;

    const KNOWN_TECHNICIANS = [
        "강정환", "강진수", "공병철", "국승욱", "김영금", "김응돌", "김지흥", "김태근", 
        "김남률", "민지운", "박건우", "박은철", "박종덕", "박종선", "배철옥", "백인수", 
        "손성훈", "안종수", "양호진", "우준혁", "유경민", "이동하", "이대흥", "이성우", 
        "이승호", "이시복", "이용신", "이철훈", "전용호", "정권", "정승백", "정승영", 
        "정한주", "정호진", "조운형", "주세환", "주병윤", "진호관", "채건병", "천명석", 
        "최병일", "최정규", "홍창표"
    ];

    document.getElementById("pdfFile").addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById("pageIndicator").innerText = "📄 의뢰서 문서를 불러오는 중...";

        const fileReader = new FileReader();
        fileReader.onload = async function () {
            const typedarray = new Uint8Array(this.result);
            try {
                const loadingTask = pdfjsLib.getDocument({
                    data: typedarray,
                    cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/cmaps/',
                    cMapPacked: true
                });
                pdfDoc = await loadingTask.promise;
                totalPdfPages = pdfDoc.numPages; 
                currentPdfPage = 1; 
                await loadAndRenderPage(currentPdfPage);
            } catch (error) {
                alert("⚠️ PDF를 인식하지 못했습니다.");
            }
        };
        fileReader.readAsArrayBuffer(file);
    });

    async function loadAndRenderPage(pageNumber) {
        if (!pdfDoc) return;

        document.getElementById("manualInput").value = "";
        document.getElementById("ocrResult").innerHTML = "<span style='color: #64748b;'>📸 바코드를 조준하거나 자재명을 바로 터치해 주세요.</span>";
        document.getElementById("status").innerHTML = `<span style="color: #475569; font-weight: bold;">검수 대기</span>`;
        stopBarcodeScanner(); 
        currentPageProducts = []; 

        const canvas = document.getElementById("pdfCanvas");
        const ctx = canvas.getContext("2d");
        const pageIndicator = document.getElementById("pageIndicator");

        if (currentRenderTask) {
            try { currentRenderTask.cancel(); } catch(c){}
            currentRenderTask = null;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        try {
            const page = await pdfDoc.getPage(pageNumber);
            const viewport = page.getViewport({ scale: 1.2 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderContext = { canvasContext: ctx, viewport: viewport };
            currentRenderTask = page.render(renderContext);
            await currentRenderTask.promise;
            currentRenderTask = null; 

            const textContent = await page.getTextContent();
            let pageText = textContent.items.map(item => item.str || "").join(" ");
            pageText = pageText.replace(/[\r\n\t,`"'’“]|\s+/g, " ").trim();

            currentTechnician = "미지정";
            let compressedText = pageText.replace(/\s+/g, "");
            for (let tech of KNOWN_TECHNICIANS) {
                if (compressedText.includes("설치기사" + tech) || compressedText.includes(tech)) {
                    currentTechnician = tech;
                    break;
                }
            }

            if (currentTechnician === "미지정") {
                let techMatch = pageText.match(/설치기사\s+([가-힣]{2,4})/i) || pageText.match(/설치기사([가-힣]{2,4})/i);
                if (techMatch && techMatch[1] && !["고객명", "설치", "연락", "협력"].includes(techMatch[1])) {
                    currentTechnician = techMatch[1].trim();
                }
            }

            currentCustomer = "미확인";
            let custIdx = pageText.indexOf("고객명");
            if (custIdx !== -1) {
                let sub = pageText.substring(custIdx, custIdx + 30);
                let names = sub.match(/([가-힣]{2,4})/g);
                if (names) {
                    let realCust = names.find(n => !["고객명", "연락처", "전화", "설치", "설치기사", currentTechnician].includes(n));
                    if (realCust) currentCustomer = realCust;
                }
            }

            // 🎯 [핵심 패치] 모델명 추출 필터링 완화 및 중복 수량 카운트 로직
            const upperRawText = pageText.toUpperCase();
            const airconPattern = /(SQ|FQ|PQ)[A-Z0-9]{4,10}/g; // 에어컨 자재 코드 정밀 매칭
            const matchedWords = upperRawText.match(airconPattern) || [];

            let modelCounter = {};
            for (let word of matchedWords) {
                let finalModel = word.trim();
                if (finalModel.includes('2026') || finalModel.length < 5) continue;
                
                modelCounter[finalModel] = (modelCounter[finalModel] || 0) + 1;
            }

            // 개별 자재 아이템 생성 (수량이 여러 개면 여러 개 등록)
            for (let model in modelCounter) {
                let count = modelCounter[model];
                for(let i=0; i<count; i++) {
                    currentPageProducts.push({ 
                        model: model, 
                        checked: false, 
                        displaySuffix: count > 1 ? ` (${i+1}/${count})` : "" 
                    });
                }
            }

            updateOrderListUI();
            pageIndicator.innerText = `의뢰서 위치: ${pageNumber} / ${totalPdfPages} 장`;

        } catch (err) {
            console.error(err);
            pageIndicator.innerText = `⚠️ 이동 실패`;
        }
    }

    function updateOrderListUI() {
        const orderList = document.getElementById("orderList");
        const statusDiv = document.getElementById("status");

        let htmlContent = `
            <div style="background:#e0f2fe; color:#0369a1; padding:10px; border-radius:6px; margin-bottom:12px; font-weight:bold;">
                👷 담당기사: <span style="font-size:16px; color:#0284c7;">${currentTechnician}</span> 기사님
            </div>
            <div style="margin-bottom: 12px; font-size:14px; color:#334155;">
                👤 <b>고객명:</b> ${currentCustomer} 고객님
            </div>
        `;

        if (currentPageProducts.length === 0) {
            htmlContent += `<div style="color:#64748b; font-size:13px; padding:10px; background:#f1f5f9; border-radius:6px;">배정 자재 데이터가 없습니다.</div>`;
            statusDiv.innerHTML = `<span style="color: #64748b; font-weight: bold;">확인할 자재 없음</span>`;
        } else {
            let allDone = true;
            currentPageProducts.forEach((prod, idx) => {
                if (!prod.checked) allDone = false;

                let modelStyle = prod.checked ? "color:#94a3b8; text-decoration: line-through; font-size:15px;" : "color:#b91c1c; font-weight:bold; font-size:15px;";
                let statusBadge = prod.checked ? `<span class="prod-status-done">✅ 완료</span>` : `<span class="prod-status-wait">❌ 미검수</span>`;

                htmlContent += `
                    <div class="prod-item" onclick="quickSelectModel('${prod.model}', ${idx})">
                        <div>
                            <span style="color:#64748b; font-weight:bold; margin-right:5px;">${idx + 1}.</span>
                            <span style="${modelStyle}">${prod.model}${prod.displaySuffix}</span>
                        </div>
                        ${statusBadge}
                    </div>
                `;
            });

            if (allDone) {
                statusDiv.innerHTML = `
                    <div style="background:#dcfce7; border:2px solid #22c55e; color:#15803d; padding:12px; border-radius:8px; font-weight:bold; font-size:16px; margin-top:5px;">
                        🎉 [검수 완료] 모든 자재 상차 확인 완료!
                    </div>
                `;
            } else {
                let leftCount = currentPageProducts.filter(p => !p.checked).length;
                statusDiv.innerHTML = `<span style="color: #2563eb; font-weight: bold;">⚠️ 상차 검수 진행 중 (남은 자재: ${leftCount}개)</span>`;
            }
        }
        orderList.innerHTML = htmlContent;
    }

    let selectedProductIndex = -1;
    window.quickSelectModel = function(modelName, index) {
        selectedProductIndex = index;
        document.getElementById("manualInput").value = modelName;
        document.getElementById("ocrResult").innerHTML = `<span style="color:#4f46e5; font-weight:bold;">품목 선택됨: [${modelName}] (목록 ${index+1}번 항목)</span>`;
    };

    document.getElementById("startScanBtn").addEventListener("click", function() {
        if(isScanning) { stopBarcodeScanner(); return; }
        if (currentPageProducts.length === 0) { alert("먼저 PDF 의뢰서를 등록해주세요."); return; }

        const container = document.getElementById("scannerContainer");
        const ocrResultDiv = document.getElementById("ocrResult");
        const startBtn = document.getElementById("startScanBtn");

        container.style.display = "block";
        ocrResultDiv.innerHTML = "<span style='color:#2563eb;'>⏳ 바코드 스캐너 구동 중...</span>";
        startBtn.innerText = "🛑 스캐너 카메라 끄기";
        isScanning = true;

        codeReader.decodeFromVideoDevice(undefined, 'previewVideo', (result, err) => {
            if (result) {
                let scannedRaw = result.text.toUpperCase().trim();
                console.log("바코드 스캔 원본:", scannedRaw);

                let matchedModel = "";
                let matchedIndex = -1;
                let isMatched = false;

                // 1단계: 바코드 안에 모델명 정보 직접 대조 (위쪽 바코드)
                for (let i = 0; i < currentPageProducts.length; i++) {
                    let prod = currentPageProducts[i];
                    if (prod.checked) continue; 
                    
                    let target = prod.model.toUpperCase();
                    let cleanTarget = target.replace(/[-.]/g, '');

                    if (scannedRaw.includes(target) || target.includes(scannedRaw) || scannedRaw.includes(cleanTarget)) {
                        isMatched = true;
                        matchedModel = prod.model;
                        matchedIndex = i;
                        break;
                    }
                }

                // 2단계: 일련번호용 아래쪽 바코드 우회 대조 (미검수 항목 순차 연동)
                if (!isMatched) {
                    for (let i = 0; i < currentPageProducts.length; i++) {
                        if (!currentPageProducts[i].checked) {
                            matchedModel = currentPageProducts[i].model;
                            matchedIndex = i;
                            isMatched = true;
                            break;
                        }
                    }
                }

                if (isMatched) {
                    selectedProductIndex = matchedIndex;
                    document.getElementById("manualInput").value = matchedModel;
                    ocrResultDiv.innerHTML = `<span style="color:#16a34a; font-size:15px;">🔔 <b>자동 매칭 성공!</b> [${matchedModel}] 입력됨.</span>`;
                    stopBarcodeScanner(); 
                } else {
                    ocrResultDiv.innerHTML = `<span style="color:#dc2626;">⚠️ 인식 오류. 목록을 직접 클릭해 주세요!</span>`;
                }
            }
        }).catch(err => {
            ocrResultDiv.innerHTML = "<span style='color:red;'>카메라 연동 실패.</span>";
            stopBarcodeScanner();
        });
    });

    function stopBarcodeScanner() {
        codeReader.reset();
        document.getElementById("scannerContainer").style.display = "none";
        document.getElementById("startScanBtn").innerText = "🔍 바코드 카메라 켜기";
        isScanning = false;
    }

    document.getElementById("resetScanBtn").addEventListener("click", function() {
        stopBarcodeScanner();
        selectedProductIndex = -1;
        document.getElementById("manualInput").value = "";
        document.getElementById("ocrResult").innerHTML = "<span style='color:#4a5568;'>🗑️ 스캔 기록이 초기화되었습니다.</span>";
    });

    document.getElementById("checkBtn").addEventListener("click", function () {
        const manualInput = document.getElementById("manualInput");
        const modelToCompare = manualInput.value.trim().toUpperCase();

        if (modelToCompare === "") {
            alert("모델명을 선택하거나 바코드 스캔을 완료한 뒤 확정 버튼을 눌러주세요.");
            return;
        }

        let targetProduct = null;
        
        // 인덱스가 지정되어 있다면 해당 항목 우선 처리 (동일 자재 중복 대응)
        if (selectedProductIndex !== -1 && currentPageProducts[selectedProductIndex] && currentPageProducts[selectedProductIndex].model === modelToCompare) {
            targetProduct = currentPageProducts[selectedProductIndex];
        } else {
            // 인덱스가 없으면 미검수 상태인 동일 모델명 검색
            targetProduct = currentPageProducts.find(p => p.model === modelToCompare && !p.checked);
        }

        if (targetProduct) {
            if (targetProduct.checked) {
                alert(`알림: 선택하신 항목은 이미 검수가 완료되었습니다.`);
            } else {
                targetProduct.checked = true; 
                alert(`✅ 상차 확인 성공!\n[${modelToCompare}] 품목 검수 완료 처리되었습니다.`);
                manualInput.value = ""; 
                selectedProductIndex = -1;
                document.getElementById("ocrResult").innerText = "스캔 대기 중...";
                updateOrderListUI(); 
            }
        } else {
            alert(`❌ 경고! 오상차 위험!\n현재 미검수 목록에는 [${modelToCompare}]가 존재하지 않거나 이미 검수가 완료되었습니다.`);
        }
    });

    document.getElementById("searchBtn").addEventListener("click", async function () {
        let query = document.getElementById("techSearchInput").value.trim();
        if (!pdfDoc) { alert("의뢰서 PDF 파일을 먼저 올려주세요!"); return; }
        if (query === "") { alert("검색할 기사님 성함을 입력해 주세요."); return; }

        const pageIndicator = document.getElementById("pageIndicator");
        pageIndicator.innerText = `🔍 문서 내에서 '${query}' 기사님 찾는 중...`;

        let foundPage = -1;
        for (let p = 1; p <= totalPdfPages; p++) {
            const page = await pdfDoc.getPage(p);
            const textContent = await page.getTextContent();
            let pageText = textContent.items.map(item => item.str || "").join(" ");
            let compressedText = pageText.replace(/[\s\r\n\t,`"'’ Bars“]/g, "");
            
            if (compressedText.includes("설치기사" + query) || compressedText.includes(query)) {
                foundPage = p;
                break; 
            }
        }

        if (foundPage !== -1) {
            currentPdfPage = foundPage;
            await loadAndRenderPage(currentPdfPage);
        } else {
            alert(`❌ '${query}' 기사님은 이 의뢰서 문서에 등록되어 있지 않습니다.`);
            pageIndicator.innerText = `의뢰서 위치: ${currentPdfPage} / ${totalPdfPages} 장`;
        }
    });

    document.getElementById("clearSearchBtn").addEventListener("click", async function() {
        document.getElementById("techSearchInput").value = "";
        if (pdfDoc) { currentPdfPage = 1; await loadAndRenderPage(currentPdfPage); }
    });

    document.getElementById("prevPageBtn").addEventListener("click", async function () {
        if (!pdfDoc) return;
        if (currentPdfPage > 1) { currentPdfPage--; await loadAndRenderPage(currentPdfPage); }
        else { alert("첫 번째 의뢰서 페이지입니다."); }
    });

    document.getElementById("nextPageBtn").addEventListener("click", async function () {
        if (!pdfDoc) return;
        if (currentPdfPage < totalPdfPages) { currentPdfPage++; await loadAndRenderPage(currentPdfPage); }
        else { alert("마지막 의뢰서 페이지입니다."); }
    });
</script>

</body>
</html>
