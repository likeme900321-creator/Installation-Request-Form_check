    <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daon E.N.G 에어컨 자재 검수 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.0/dist/tesseract.min.js"></script>
    
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f1f5f9; padding: 15px; margin: 0; color: #1e293b; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h2 { text-align: center; color: #1e3a8a; margin-top: 0; font-size: 20px; }
        .card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 5px; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-secondary { background: #64748b; color: white; }
        .btn-success { background: #16a34a; color: white; }
        .page-ctrl { display: flex; justify-content: space-between; gap: 10px; margin: 10px 0; }
        .page-ctrl button { flex: 1; padding: 10px; font-weight: bold; background: #e2e8f0; border: none; border-radius: 6px; cursor: pointer; }
        #pdfCanvas { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; margin-top: 10px; background: #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Daon E.N.G 자재 검수 시스템</h2>
    
    <div class="card">
        <label style="font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px;">📄 설치의뢰서 PDF 등록</label>
        <input type="file" id="pdfFile" accept="application/pdf" style="width: 100%; font-size: 13px;">
    </div>

    <div class="card" style="background: #edf2f7; border-color: #cbd5e1; display: flex; gap: 8px; align-items: center;">
        <label for="techSearchInput" style="font-size: 14px; font-weight: bold; color: #2d3748; white-space: nowrap;">👷 기사명 검색:</label>
        <input type="text" id="techSearchInput" placeholder="기사님 성함 입력 (예: 강정환)" style="flex: 1; padding: 8px 12px; border: 1px solid #a0aec0; border-radius: 6px; font-size: 14px; font-weight: bold;">
        <button id="searchBtn" style="padding: 8px 14px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold;">검색</button>
        <button id="clearSearchBtn" style="padding: 8px 14px; background: #4a5568; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold;">전체</button>
    </div>

    <div class="page-ctrl">
        <button id="prevPageBtn">◀ 이전 의뢰서</button>
        <button id="nextPageBtn">다음 의뢰서 ▶</button>
    </div>
    <div id="pageIndicator" style="text-align: center; font-weight: bold; color: #475569; font-size: 14px; margin-bottom: 10px;">
        의뢰서 파일을 선택해 주세요.
    </div>

    <div id="orderList" class="card" style="min-height: 100px; background: #fafafa;">
        <span style="color: #94a3b8; font-size: 13px;">진짜 단품 자재 목록이 여기에 출력됩니다.</span>
    </div>

    <div class="card" style="border-left: 5px solid #2563eb;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #1e3a8a;">📸 1단계: 실물 바코드 사진 매칭</label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" class="btn btn-secondary" style="padding: 8px;">
        <div id="ocrResult" style="margin-top: 8px; font-size: 13px; font-weight: bold; color: #475569;">스캔 대기 중...</div>
    </div>

    <div class="card" style="border-left: 5px solid #16a34a;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #15803d;">🔍 2단계: 수동 확인 및 확정</label>
        <input type="text" id="manualInput" placeholder="모델명 직접 입력 또는 자동 입력창" style="width:95%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 8px; font-size: 14px;">
        <button id="checkBtn" class="btn btn-success">✅ 상차 자재 검수 확정</button>
        <div id="status" style="margin-top: 10px; text-align: center; font-size: 15px;"></div>
    </div>

    <div style="font-weight: bold; margin-top: 15px; font-size: 13px; color: #64748b;">📄 원본 의뢰서 도면 미리보기</div>
    <div style="width:100%; overflow:auto; border: 1px solid #cbd5e1; background:#e2e8f0; margin-top:10px;">
        <canvas id="pdfCanvas"></canvas>
    </div>
</div>

<script>
    // 워커 엔진 주소도 가장 안전하고 검증된 링크로 설정
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfDoc = null;          
    let currentPdfPage = 1;     
    let totalPdfPages = 0;      
    let currentPageTargetModels = []; 
    let currentRenderTask = null;

    // 💡 다온 ENG 기사님 43명 전원 명단 등록 데이터베이스 (글자 꼬임 방역벽)
    const KNOWN_TECHNICIANS = [
        "강정환", "강진수", "공병철", "국승욱", "김영금", "김응돌", "김지흥", "김태근", 
        "김남률", "민지운", "박건우", "박은철", "박종덕", "박종선", "배철옥", "백인수", 
        "손성훈", "안종수", "양호진", "우준혁", "유경민", "이동하", "이대흥", "이성우", 
        "이승호", "이시복", "이용신", "이철훈", "전용호", "정권", "정승백", "정승영", 
        "정한주", "정호진", "조운형", "주세환", "주병윤", "진호관", "채건병", "천명석", 
        "최병일", "최정규", "홍창표"
    ];

    // [1] 파일 선택 등록 구역
    document.getElementById("pdfFile").addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (!file) return;

        const pageIndicator = document.getElementById("pageIndicator");
        pageIndicator.innerText = "📄 의뢰서 문서를 불러오는 중...";

        const fileReader = new FileReader();
        fileReader.onload = async function () {
            const typedarray = new Uint8Array(this.result);
            try {
                const loadingTask = pdfjsLib.getDocument({
                    data: typedarray,
                    cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/cmaps/',
                    cMapPacked: true
                });
                
                pdfDoc = await loadingTask.promise;
                totalPdfPages = pdfDoc.numPages; 
                currentPdfPage = 1; 
                
                await loadAndRenderPage(currentPdfPage);

            } catch (error) {
                console.error(error);
                alert("⚠️ PDF를 인식하지 못했습니다. 브라우저를 새로고침한 후 다시 시도해 주세요.");
                pageIndicator.innerText = "파일 인식 실패. 새로고침이 필요합니다.";
            }
        };
        fileReader.readAsArrayBuffer(file);
    });

    // [2] 🔄 화면 및 도면 강제 리렌더링 코어 함수
    async function loadAndRenderPage(pageNumber) {
        if (!pdfDoc) return;

        document.getElementById("manualInput").value = "";
        document.getElementById("ocrResult").innerHTML = "<span style='color: #64748b;'>📸 스티커 바코드 사진을 촬영해 주세요.</span>";
        document.getElementById("status").innerHTML = `<span style="color: #475569; font-weight: bold;">검수 대기</span>`;
        currentPageTargetModels = []; 

        const canvas = document.getElementById("pdfCanvas");
        const ctx = canvas.getContext("2d");
        const pageIndicator = document.getElementById("pageIndicator");
        const orderList = document.getElementById("orderList");

        if (currentRenderTask) {
            try { currentRenderTask.cancel(); } catch(c){}
            currentRenderTask = null;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        try {
            const page = await pdfDoc.getPage(pageNumber);
            const viewport = page.getViewport({ scale: 1.2 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderContext = { canvasContext: ctx, viewport: viewport };
            currentRenderTask = page.render(renderContext);
            await currentRenderTask.promise;
            currentRenderTask = null; 

            // 텍스트 정제 가공
            const textContent = await page.getTextContent();
            let pageText = textContent.items.map(item => item.str || "").join(" ");
            pageText = pageText.replace(/[\r\n\t,`"'’“]|\s+/g, " ").trim();

            // 🎯 [오인식 100% 원천 봉쇄] 명단 기반 매칭 알고리즘
            let technicianName = "미지정";
            let compressedText = pageText.replace(/\s+/g, "");
            
            for (let tech of KNOWN_TECHNICIANS) {
                if (compressedText.includes("설치기사" + tech) || compressedText.includes(tech)) {
                    technicianName = tech;
                    break;
                }
            }

            // 백업 안전장치 필터
            if (technicianName === "미지정") {
                let techMatch = pageText.match(/설치기사\s+([가-힣]{2,4})/i) || pageText.match(/설치기사([가-힣]{2,4})/i);
                if (techMatch && techMatch[1] && !["고객명", "설치", "연락", "협력"].includes(techMatch[1])) {
                    technicianName = techMatch[1].trim();
                }
            }

            // 🎯 고객명 추출 가공구역
            let customerName = "미확인";
            let custIdx = pageText.indexOf("고객명");
            if (custIdx !== -1) {
                let sub = pageText.substring(custIdx, custIdx + 30);
                let names = sub.match(/([가-힣]{2,4})/g);
                if (names) {
                    let realCust = names.find(n => !["고객명", "연락처", "전화", "설치", "설치기사", technicianName].includes(n));
                    if (realCust) customerName = realCust;
                }
            }

            // 자재 모델명 추출 구역
            let uniqueProducts = [];
            let seenModels = new Set();

            const upperRawText = pageText.toUpperCase();
            // 정규식으로 모델명 패턴(SQ/FQ로 시작) 먼저 추출
            const matches = upperRawText.match(/(SQ|FQ)[A-Z0-9]{4,10}/g) || [];

            for (let m of matches) {
           // 1. PQ 제외
            if (m.startsWith("PQ")) continue;
    
           // 2. 세트 모델명 필터링 규칙 (끝이 S이거나, 끝 3자리에 숫자가 있으면 제외)
            if (m.endsWith("S") || /\d/.test(m.slice(-3))) continue;

            // 3. 확장자 처리
            let finalModel = m;
            if (upperRawText.includes(m + ".BKOR")) finalModel = m + ".BKOR";
            else if (upperRawText.includes(m + ".EKOR")) finalModel = m + ".EKOR";

            if (!seenModels.has(finalModel)) {
                seenModels.add(finalModel);
                uniqueProducts.push({ model: finalModel, qty: "1" });
                }
                }

currentPageTargetModels = uniqueProducts.map(p => p.model);

            // 레이아웃 동적 드로잉
            let htmlContent = `
                <div style="background:#e0f2fe; color:#0369a1; padding:10px; border-radius:6px; margin-bottom:12px; font-weight:bold;">
                    👷 담당기사: <span style="font-size:16px; color:#0284c7;">${technicianName}</span> 기사님
                </div>
                <div style="margin-bottom: 10px; font-size:14px; color:#334155;">
                    👤 <b>고객명:</b> ${customerName} 고객님
                </div>
                <div style="font-weight:bold; margin-top:15px; margin-bottom:5px; font-size:13px; color:#4f46e5;">[배정 자재 목록]</div>
            `;

            if (uniqueProducts.length === 0) {
                htmlContent += `<div style="color:#64748b; font-size:13px; padding:10px; background:#f1f5f9; border-radius:6px;">배정 자재가 없습니다.</div>`;
            } else {
                uniqueProducts.forEach((prod, idx) => {
                    htmlContent += `
                        <div style="margin-bottom: 8px; border:1px solid #e2e8f0; padding:10px; border-radius:6px; background:white;">
                            • <b>자재 ${idx + 1}:</b> <span style="color:#b91c1c; font-weight:bold; font-size:15px;">${prod.model}</span> 
                            <span style="float:right; color:#1e293b; font-weight:bold;">1 개</span>
                        </div>
                    `;
                });
            }
            
            orderList.innerHTML = htmlContent;
            pageIndicator.innerText = `의뢰서 위치: ${pageNumber} / ${totalPdfPages} 장`;
            document.getElementById("status").innerHTML = `<span style="color: #2563eb; font-weight: bold;">현재 페이지 검수 대기 (자재: ${currentPageTargetModels.length}개)</span>`;

        } catch (err) {
            console.error(err);
            pageIndicator.innerText = `⚠️ ${pageNumber}페이지 이동 실패`;
        }
    }

    // 🚀 [정밀 기사명 탐색 엔진]
    document.getElementById("searchBtn").addEventListener("click", async function () {
        let query = document.getElementById("techSearchInput").value.trim();
        if (!pdfDoc) {
            alert("의뢰서 PDF 파일을 먼저 올려주세요!");
            return;
        }
        if (query === "") {
            alert("검색할 기사님 성함을 입력해 주세요.");
            return;
        }

        const pageIndicator = document.getElementById("pageIndicator");
        pageIndicator.innerText = `🔍 문서 내에서 '${query}' 기사님 찾는 중...`;

        let foundPage = -1;
        
        for (let p = 1; p <= totalPdfPages; p++) {
            const page = await pdfDoc.getPage(p);
            const textContent = await page.getTextContent();
            let pageText = textContent.items.map(item => item.str || "").join(" ");
            let compressedText = pageText.replace(/[\s\r\n\t,`"'’“]/g, "");
            
            if (compressedText.includes("설치기사" + query) || compressedText.includes(query)) {
                foundPage = p;
                break; 
            }
        }

        if (foundPage !== -1) {
            currentPdfPage = foundPage;
            await loadAndRenderPage(currentPdfPage);
        } else {
            alert(`❌ '${query}' 기사님은 이 의뢰서 문서에 등록되어 있지 않습니다.`);
            pageIndicator.innerText = `의뢰서 위치: ${currentPdfPage} / ${totalPdfPages} 장`;
        }
    });

    // 전체보기 리셋 버튼
    document.getElementById("clearSearchBtn").addEventListener("click", async function() {
        document.getElementById("techSearchInput").value = "";
        if (pdfDoc) {
            currentPdfPage = 1;
            await loadAndRenderPage(currentPdfPage);
        }
    });

    // [3] 이전장 버튼
    document.getElementById("prevPageBtn").addEventListener("click", async function () {
        if (!pdfDoc) return;
        if (currentPdfPage > 1) {
            currentPdfPage--;
            await loadAndRenderPage(currentPdfPage);
        } else {
            alert("첫 번째 의뢰서 페이지입니다.");
        }
    });

    // [4] 다음장 버튼
    document.getElementById("nextPageBtn").addEventListener("click", async function () {
        if (!pdfDoc) return;
        if (currentPdfPage < totalPdfPages) {
            currentPdfPage++;
            await loadAndRenderPage(currentPdfPage);
        } else {
            alert("마지막 의뢰서 페이지입니다.");
        }
    });

    // [5] 사진 카메라 연동 스캔
    document.getElementById("cameraInput").addEventListener("change", async function (e) {
        const photoFile = e.target.files[0];
        if (!photoFile) return;

        const manualInput = document.getElementById("manualInput");
        const ocrResultDiv = document.getElementById("ocrResult");
        
        manualInput.value = "";
        ocrResultDiv.innerHTML = "<span style='color: #2563eb; font-weight: bold;'>⏳ 현재 페이지 기사님 자재와 매칭 분석 중...</span>";

        try {
            const result = await Tesseract.recognize(photoFile, 'eng', {
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-',
                corePath: 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.0/tesseract-core.wasm.js'
            });
            
            let detectedText = result.data.text.replace(/[\s\r\n\t]/g, '').toUpperCase();
            let isMatched = false;
            let matchedModel = "";

            for (let model of currentPageTargetModels) {
                if (detectedText.includes(model)) {
                    isMatched = true;
                    matchedModel = model;
                    break;
                }
            }

            if (isMatched) {
                manualInput.value = matchedModel;
                ocrResultDiv.innerHTML = `<span style="color: #16a34a; font-weight: bold;">✅ 일치 확인 (${matchedModel})!</span>`;
            } else {
                manualInput.value = "";
                ocrResultDiv.innerHTML = `<span style="color: #dc2626; font-weight: bold;">❌ 이 차량 배정 자재가 아닙니다! 확인하세요.</span>`;
            }

        } catch (err) {
            console.error(err);
            ocrResultDiv.innerHTML = "<span style='color: red;'>사진 인식 실패 (수동 입력 필요)</span>";
        }
    });

    // [6] 최종 검수 확정 도장
    document.getElementById("checkBtn").addEventListener("click", function () {
        const manualInput = document.getElementById("manualInput");
        const statusDiv = document.getElementById("status");
        const modelToCompare = manualInput.value.trim().toUpperCase();

        if (modelToCompare === "") {
            alert("모델명을 직접 입력하거나 사진 스캔을 먼저 해주세요.");
            return;
        }

        const isFinalCheckPassed = currentPageTargetModels.includes(modelToCompare);

        if (isFinalCheckPassed) {
            alert(`✅ 검수 성공!\n현재 기사님의 정상 상차 자재입니다: ${modelToCompare}`);
            statusDiv.innerHTML = `<span style="color: #16a34a; font-weight: bold;">상차 완료 승인 (${modelToCompare})</span>`;
        } else {
            alert(`❌ 경고! 오상차 위험!\n현재 활성화된 기사님 품목 리스트에는 [${modelToCompare}]가 없습니다.`);
            statusDiv.innerHTML = `<span style="color: #dc2626; font-weight: bold;">⚠️ 오상차 위험 품목 감지</span>`;
        }
    });
</script>

</body>
</html>
