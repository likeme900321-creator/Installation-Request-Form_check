<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Daon E.N.G 자재 최종 검수기</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .item { background: white; padding: 12px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .checked { background: #d1fae5; text-decoration: line-through; color: #065f46; }
        button { padding: 6px 12px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>자재 상차 검수 리스트</h2>
    <input type="file" id="pdfFile" accept="application/pdf">
    <div id="orderList" style="margin-top:20px;"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        document.getElementById("pdfFile").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async () => {
                const pdf = await pdfjsLib.getDocument({data: new Uint8Array(reader.result)}).promise;
                const orderList = document.getElementById("orderList");
                orderList.innerHTML = "";
                let foundModels = new Set();

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    // 1. 텍스트를 읽자마자 .AKOR을 몽땅 없애버립니다.
                    let text = (await page.getTextContent()).items.map(it => it.str).join(" ");
                    text = text.replace(/\.AKOR/g, ""); 
                    
                    // 2. 이제 남은 데이터에서 SQ/FQ 모델명 추출
                    const matches = text.match(/(SQ|FQ)[A-Z0-9]{4,15}/g);
                    
                    if (matches) {
                        matches.forEach(m => {
                            // PQ 제외, 너무 긴 세트명 제외
                            if (!m.startsWith("PQ") && m.length < 12) {
                                // 3. 특수 확장자(BKOR, EKOR)가 원래 붙어있던 녀석들만 복구
                                let finalModel = m;
                                if (text.includes(m + ".BKOR")) finalModel = m + ".BKOR";
                                else if (text.includes(m + ".EKOR")) finalModel = m + ".EKOR";
                                
                                foundModels.add(finalModel);
                            }
                        });
                    }
                }

                [...foundModels].sort().forEach(model => {
                    const div = document.createElement("div");
                    div.className = "item";
                    div.innerHTML = `<span>${model}</span> <button onclick="this.parentElement.classList.add('checked')">확인</button>`;
                    orderList.appendChild(div);
                });
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</html>
