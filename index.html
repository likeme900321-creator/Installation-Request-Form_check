<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Daon E.N.G 자재 검수 시스템</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .item { background: white; padding: 12px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .checked { background: #d1fae5; text-decoration: line-through; color: #065f46; }
        button { padding: 6px 12px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>자재 상차 검수 리스트</h2>
    <input type="file" id="pdfFile" accept="application/pdf">
    <div id="orderList" style="margin-top:20px;"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        document.getElementById("pdfFile").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async () => {
                const pdf = await pdfjsLib.getDocument({data: new Uint8Array(reader.result)}).promise;
                const orderList = document.getElementById("orderList");
                orderList.innerHTML = "";
                let foundModels = new Set();

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    
                    textContent.items.forEach(item => {
                        let text = item.str.trim();
                        
                        // 1. "세트모델명"이라는 단어가 포함된 줄은 아예 무시
                        if (text.includes("세트모델명")) return;
                        
                        // 2. PQ로 시작하는 항목 무시
                        if (text.startsWith("PQ")) return;

                        // 3. SQ/FQ 패턴 매칭
                        const match = text.match(/(SQ|FQ)[A-Z0-9]{4,10}/);
                        if (match) {
                            let model = match[0];
                            
                            // 4. .BKOR, .EKOR은 살리고, 그 외(AKOR 포함)는 무시
                            // 원본 텍스트에 확장자가 붙어있는지 확인
                            if (text.includes(model + ".BKOR")) model += ".BKOR";
                            else if (text.includes(model + ".EKOR")) model += ".EKOR";
                            
                            foundModels.add(model);
                        }
                    });
                }

                [...foundModels].sort().forEach(model => {
                    const div = document.createElement("div");
                    div.className = "item";
                    div.innerHTML = `<span>${model}</span> <button onclick="this.parentElement.classList.add('checked')">확인</button>`;
                    orderList.appendChild(div);
                });
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
